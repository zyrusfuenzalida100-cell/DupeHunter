<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Duplicate Janitor</title>
    <style>
        :root {
            --bg-dark: #111827;
            --bg-card: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --border-color: #374151;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        .main-header {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .main-header { flex-direction: row; }
        }

        .title {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #60a5fa, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--text-muted); font-size: 0.875rem; margin: 0.2rem 0 0 0; }

        .controls { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
        @media (min-width: 768px) { .controls { width: auto; } }

        .input-group { position: relative; display: flex; }
        .api-input {
            width: 100%;
            background: #374151;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
        }

        .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            background: #4b5563;
            border: none;
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .button-row { display: flex; gap: 0.5rem; }
        .primary-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .icon-btn {
            background: #374151;
            border: none;
            color: white;
            padding: 0.7rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .status-box {
            padding: 1.25rem;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-green));
            transition: width 0.1s ease-out;
        }

        .current-path {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results-grid { display: grid; gap: 1.5rem; }
        .empty-state { padding: 5rem 0; text-align: center; opacity: 0.5; }

        .duplicate-group {
            background: var(--bg-card);
            padding: 1.25rem;
            border-radius: 1rem;
            border-left: 5px solid var(--accent-red);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .file-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.75rem;
            margin-top: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .preview-box {
            width: 80px;
            height: 80px;
            background: #111827;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .preview-img, .preview-video { width: 100%; height: 100%; object-fit: cover; }
        
        .video-indicator {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .action-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.25rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .selection-info { display: flex; align-items: center; gap: 1.5rem; }
        .badge { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.8rem; }
        
        .format-selector { display: flex; flex-direction: column; gap: 0.2rem; }
        .format-selector label { font-size: 0.65rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
        .format-selector select { 
            background: #374151; 
            color: white; 
            border: 1px solid var(--border-color); 
            border-radius: 0.4rem; 
            padding: 0.3rem; 
            font-size: 0.85rem; 
        }

        .ai-btn {
            background: linear-gradient(to right, #dc2626, #f87171);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .deep-scan-btn {
            background: linear-gradient(to right, #10b981, #34d399);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .ai-btn:active, .deep-scan-btn:active { transform: scale(0.96); }
        .ai-btn:disabled, .deep-scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hidden { display: none !important; }
        
        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent-red);
        }

        .metadata-tag {
            font-size: 0.65rem;
            background: #4b5563;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            margin-right: 0.3rem;
            color: #e5e7eb;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <div class="brand">
                <h1 class="title">AI Duplicate Janitor</h1>
                <p class="subtitle">Smart Hashing & AI Metadata Analysis</p>
            </div>
            <div class="controls">
                <div class="input-group">
                    <input type="password" id="apiKey" placeholder="Groq API Key (Stored Locally)" class="api-input">
                    <button onclick="clearKey()" class="clear-btn">I-clear</button>
                </div>
                <div class="button-row">
                    <button onclick="selectFolder()" id="scanBtn" class="primary-btn">
                        <span>📂</span> Pumili ng Folder
                    </button>
                    <button onclick="resetApp()" class="icon-btn" title="Reset">🔄</button>
                </div>
            </div>
        </header>

        <div id="statusBox" class="status-box hidden">
            <div class="status-header">
                <span id="statusText">Handa na...</span>
                <div id="loader" class="loader hidden"></div>
            </div>
            <div id="progressContainer" class="progress-container hidden">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <code id="currentPath" class="current-path hidden"></code>
        </div>

        <div id="resultsGrid" class="results-grid">
            <div id="emptyState" class="empty-state">
                <p>Pumili ng folder para simulan ang malalimang pag-scan.</p>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">Gamit ang Deep SHA-256 (Full File Scan) para sa 100% accuracy.</p>
            </div>
        </div>

        <div id="actionBar" class="action-bar hidden">
            <div class="selection-info">
                <div class="badge">
                    <span id="selectedCount">0</span> NAPILI
                </div>
                <div class="format-selector">
                    <label>Export Script Type</label>
                    <select id="scriptType">
                        <option value="bat">Windows (.bat)</option>
                        <option value="sh">Linux/Mac (.sh)</option>
                        <option value="py">Python (.py)</option>
                        <option value="pl">Perl (.pl)</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; gap: 0.5rem;">
                <button onclick="deepScanAI()" id="deepScanBtn" class="deep-scan-btn" title="Hilingin sa AI na maghanap ng magkakahawig na files">
                    <span>🧠</span> AI DEEP SCAN
                </button>
                <button onclick="processAI()" id="aiBtn" class="ai-btn">
                    <span>🤖</span> GAWAN NG CLEANUP SCRIPT
                </button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'groq_api_key_janitor';
        const MODELS = ["llama-3.1-70b-versatile", "llama-3.3-70b-versatile", "mixtral-8x7b-32768"];
        let allFiles = []; 
        let duplicateGroups = {};
        let selectedPaths = new Set();
        let totalFilesCount = 0;
        let processedFilesCount = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            
            document.getElementById('apiKey').addEventListener('input', (e) => {
                localStorage.setItem(STORAGE_KEY, e.target.value);
            });
        });

        function clearKey() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('apiKey').value = '';
        }

        function setStatus(msg, showLoader = false, showProgress = false) {
            const box = document.getElementById('statusBox');
            box.classList.remove('hidden');
            document.getElementById('statusText').innerText = msg;
            document.getElementById('loader').classList.toggle('hidden', !showLoader);
            
            const progress = document.getElementById('progressContainer');
            progress.classList.toggle('hidden', !showProgress);
            
            const pathDisplay = document.getElementById('currentPath');
            pathDisplay.classList.toggle('hidden', !showProgress);
        }

        function updateProgress(path) {
            processedFilesCount++;
            const pathDisplay = document.getElementById('currentPath');
            pathDisplay.innerText = `Kasalukuyang ini-iscan: ${path}`;
            
            if (totalFilesCount > 0) {
                const percent = (processedFilesCount / totalFilesCount) * 100;
                document.getElementById('progressBar').style.width = `${percent}%`;
            }
        }

        async function countFiles(dirHandle) {
            let count = 0;
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') count++;
                else if (entry.kind === 'directory') count += await countFiles(entry);
            }
            return count;
        }

        async function selectFolder() {
            try {
                if (!window.showDirectoryPicker) {
                    alert("Hindi suportado ng browser mo ang Directory Picker. Gumamit ng Chrome/Edge.");
                    return;
                }

                const dirHandle = await window.showDirectoryPicker();
                resetApp(false);
                
                setStatus("Binibilang ang mga file...", true, false);
                totalFilesCount = await countFiles(dirHandle);
                processedFilesCount = 0;
                
                setStatus("Deep Hashing (Full File Analysis)...", true, true);
                duplicateGroups = {};
                allFiles = [];
                
                await scanFolder(dirHandle);
                
                const apiKey = document.getElementById('apiKey').value;
                if (apiKey && allFiles.length > 0) {
                    await deepScanAI();
                } else {
                    renderResults();
                }
            } catch (err) {
                if(err.name !== 'AbortError') {
                    console.error(err);
                    setStatus("Error sa pag-access ng folder.");
                }
            }
        }

        async function scanFolder(dirHandle, path = "") {
            for await (const entry of dirHandle.values()) {
                const fullPath = path ? `${path}/${entry.name}` : entry.name;
                
                if (entry.kind === 'file') {
                    updateProgress(fullPath);
                    const file = await entry.getFile();
                    
                    // GUMAGAMIT NA NG FULL FILE HASH PARA IWAS MALI
                    const hash = await generateFullFileHash(file);
                    
                    let meta = {
                        name: entry.name,
                        path: fullPath,
                        size: file.size,
                        modified: file.lastModified,
                        type: file.type,
                        resolution: null,
                        preview: null,
                        isVideo: file.type.startsWith('video/')
                    };

                    if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
                        try {
                            const blobUrl = URL.createObjectURL(file);
                            meta.preview = blobUrl;
                            
                            if (file.type.startsWith('image/')) {
                                const img = new Image();
                                img.src = blobUrl;
                                await new Promise(r => {
                                    img.onload = () => {
                                        meta.resolution = `${img.width}x${img.height}`;
                                        r();
                                    };
                                    img.onerror = () => r();
                                });
                            } else if (file.type.startsWith('video/')) {
                                const video = document.createElement('video');
                                video.src = blobUrl;
                                video.preload = 'metadata';
                                await new Promise(r => {
                                    video.onloadedmetadata = () => {
                                        meta.resolution = `${video.videoWidth}x${video.videoHeight}`;
                                        r();
                                    };
                                    video.onerror = () => r();
                                });
                            }
                        } catch (e) { console.warn("Preview error:", fullPath); }
                    }
                    
                    if (!duplicateGroups[hash]) duplicateGroups[hash] = [];
                    duplicateGroups[hash].push(meta);
                    allFiles.push(meta);

                } else if (entry.kind === 'directory') {
                    await scanFolder(entry, fullPath);
                }
            }
        }

        // MAS MABAGAL PERO SIGURADONG TAMA (FULL FILE HASH)
        async function generateFullFileHash(file) {
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            let groupCount = 0;
            
            Object.entries(duplicateGroups).forEach(([hash, files]) => {
                if (files.length > 1) {
                    groupCount++;
                    grid.appendChild(createGroupUI(files, `EXACT CONTENT MATCH #${groupCount}`));
                }
            });

            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('currentPath').classList.add('hidden');

            if (groupCount > 0) {
                setStatus(`Nakahanap ng ${groupCount} sets ng 100% exact duplicates.`);
                document.getElementById('actionBar').classList.remove('hidden');
            } else {
                setStatus("Walang nakitang exact duplicates. AI Scan ang susubok...");
                grid.innerHTML = `<div class="empty-state">Walang exact duplicates na nahanap base sa Hashing.</div>`;
                document.getElementById('actionBar').classList.remove('hidden');
            }
        }

        function createGroupUI(files, titleText) {
            const groupContainer = document.createElement('div');
            groupContainer.className = "duplicate-group";
            const listHtml = files.map(f => `
                <div class="file-card">
                    <input type="checkbox" onchange="toggleFile('${f.path}', this.checked)">
                    <div class="preview-box">
                        ${f.preview ? (
                            f.isVideo ? 
                            `<video src="${f.preview}" class="preview-video" muted onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video><span class="video-indicator">VIDEO</span>` : 
                            `<img src="${f.preview}" class="preview-img">`
                        ) : `<span style="font-size:10px; font-weight:bold; color:var(--text-muted)">${f.name.split('.').pop().toUpperCase()}</span>`}
                    </div>
                    <div style="flex:1; min-width:0">
                        <p style="margin:0; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size: 0.9rem;">${f.name}</p>
                        <p style="margin:0.2rem 0 0 0; font-size:0.7rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${f.path}</p>
                        <div style="margin-top: 0.35rem">
                            <span class="metadata-tag">${(f.size/1024/1024).toFixed(2)} MB</span>
                            ${f.resolution ? `<span class="metadata-tag">${f.resolution}</span>` : ''}
                            <span class="metadata-tag">${new Date(f.modified).toLocaleDateString()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            groupContainer.innerHTML = `<div style="font-size:10px; color:var(--accent-red); font-weight:bold; letter-spacing: 1px; margin-bottom:10px;">${titleText}</div>${listHtml}`;
            return groupContainer;
        }

        async function deepScanAI() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) { renderResults(); return; }
            
            setStatus("AI Analysis: Naghahanap ng magkakahawig na filenames at metadata...", true, false);
            const btn = document.getElementById('deepScanBtn');
            btn.disabled = true;

            renderResults();

            const fileList = allFiles.map(f => ({
                name: f.name,
                path: f.path,
                size: f.size,
                res: f.resolution,
                date: new Date(f.modified).toISOString().split('T')[0]
            }));

            const limitedList = fileList.slice(0, 400);

            const prompt = `Act as a file system cleaner. Look at these files and identify duplicates or near-duplicates.
            Rules:
            1. ONLY group them if they are definitely related (e.g., "vacation.jpg" and "vacation (1).jpg" with same/similar size).
            2. Do NOT group files just because they have the same extension.
            3. If sizes are wildly different (e.g. 10KB vs 10MB) but names are similar, they might be thumbnails vs originals - keep them separate unless they look like versions.
            4. Focus on finding "copy" patterns in filenames.
            
            FILES: ${JSON.stringify(limitedList)}
            
            Return ONLY a JSON array of arrays of file 'path' strings.`;

            try {
                const responseText = await fetchGroqWithFallback(prompt);
                const suggestedGroups = JSON.parse(responseText);
                const grid = document.getElementById('resultsGrid');
                
                if (suggestedGroups && suggestedGroups.length > 0) {
                    const aiHeader = document.createElement('div');
                    aiHeader.style = "background:var(--bg-card); padding:1rem; border-radius:0.5rem; color:var(--accent-green); margin-bottom:1rem; font-weight:bold; border: 1px solid var(--accent-green)";
                    aiHeader.innerText = "✨ AI Analysis Results (Potential Similars)";
                    grid.prepend(aiHeader);

                    suggestedGroups.forEach((paths, i) => {
                        const groupFiles = allFiles.filter(f => paths.includes(f.path));
                        if(groupFiles.length > 0) grid.appendChild(createGroupUI(groupFiles, `AI DETECTED RELATION #${i+1}`));
                    });
                }
                setStatus("Tapos na ang malalimang pagsusuri.");
            } catch (err) {
                console.error(err);
                setStatus("AI Scan Error.");
            } finally {
                btn.disabled = false;
            }
        }

        function toggleFile(path, isChecked) {
            if (isChecked) selectedPaths.add(path);
            else selectedPaths.delete(path);
            document.getElementById('selectedCount').innerText = selectedPaths.size;
        }

        function resetApp(full = true) {
            allFiles.forEach(f => {
                if (f.preview && f.preview.startsWith('blob:')) URL.revokeObjectURL(f.preview);
            });
            selectedPaths.clear();
            allFiles = [];
            totalFilesCount = 0;
            processedFilesCount = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('selectedCount').innerText = '0';
            document.getElementById('resultsGrid').innerHTML = `<div id="emptyState" class="empty-state"><p>Pumili ng folder para simulan ang pag-scan.</p></div>`;
            document.getElementById('actionBar').classList.add('hidden');
            if(full) document.getElementById('statusBox').classList.add('hidden');
        }

        async function processAI() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return alert("API Key is required.");
            if (selectedPaths.size === 0) return alert("Pumili muna ng files.");
            const type = document.getElementById('scriptType').value;
            const btn = document.getElementById('aiBtn');
            btn.disabled = true;
            setStatus(`Generating ${type.toUpperCase()}...`, true);
            
            const prompt = `Create a safe cleanup script (${type}) to delete these files. 
            Add a clear warning at the top. 
            Ensure paths with spaces are quoted correctly. 
            FILES: ${JSON.stringify(Array.from(selectedPaths))}`;
            
            try {
                const code = await fetchGroqWithFallback(prompt);
                const blob = new Blob([code], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `cleanup_duplicates.${type}`; a.click();
                setStatus("Handa na ang script!", false);
            } catch (err) {
                setStatus("Script error.", false);
            } finally {
                btn.disabled = false;
            }
        }

        async function fetchGroqWithFallback(prompt, index = 0) {
            if (index >= MODELS.length) throw new Error("API fail.");
            const apiKey = document.getElementById('apiKey').value;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: MODELS[index], 
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.1,
                        response_format: prompt.includes("JSON") ? { type: "json_object" } : undefined
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                let content = data.choices[0].message.content;
                if (prompt.includes("JSON")) {
                    try {
                        const parsed = JSON.parse(content);
                        if (Array.isArray(parsed)) return content;
                        const values = Object.values(parsed);
                        for (let val of values) if (Array.isArray(val)) return JSON.stringify(val);
                    } catch(e) {}
                }
                return content.replace(/```[a-z]*\n/gi, '').replace(/```/g, '').trim();
            } catch (e) {
                return fetchGroqWithFallback(prompt, index + 1);
            }
        }
    </script>
</body>
</html>
