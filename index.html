<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Duplicate Janitor</title>
    <style>
        :root {
            --bg-dark: #111827;
            --bg-card: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-red: #ef4444;
            --border-color: #374151;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        .main-header {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .main-header { flex-direction: row; }
        }

        .title {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #60a5fa, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--text-muted); font-size: 0.875rem; margin: 0.2rem 0 0 0; }

        .controls { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
        @media (min-width: 768px) { .controls { width: auto; } }

        .input-group { position: relative; display: flex; }
        .api-input {
            width: 100%;
            background: #374151;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
        }

        .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            background: #4b5563;
            border: none;
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .button-row { display: flex; gap: 0.5rem; }
        .primary-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .icon-btn {
            background: #374151;
            border: none;
            color: white;
            padding: 0.7rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .status-box {
            padding: 1rem;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results-grid { display: grid; gap: 1.5rem; }
        .empty-state { padding: 5rem 0; text-align: center; opacity: 0.5; }

        .duplicate-group {
            background: var(--bg-card);
            padding: 1.25rem;
            border-radius: 1rem;
            border-left: 5px solid var(--accent-red);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .file-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.75rem;
            margin-top: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .preview-box {
            width: 64px;
            height: 64px;
            background: #111827;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .preview-img { width: 100%; height: 100%; object-fit: cover; }

        .action-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 850px;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.25rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .selection-info { display: flex; align-items: center; gap: 1.5rem; }
        .badge { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.8rem; }
        
        .format-selector { display: flex; flex-direction: column; gap: 0.2rem; }
        .format-selector label { font-size: 0.65rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
        .format-selector select { 
            background: #374151; 
            color: white; 
            border: 1px solid var(--border-color); 
            border-radius: 0.4rem; 
            padding: 0.3rem; 
            font-size: 0.85rem; 
        }

        .ai-btn {
            background: linear-gradient(to right, #dc2626, #f87171);
            border: none;
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 1rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .ai-btn:active { transform: scale(0.96); }

        .hidden { display: none !important; }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-red);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <div class="brand">
                <h1 class="title">AI Duplicate Janitor</h1>
                <p class="subtitle">Scan, Preview, and AI-Powered Cleanup</p>
            </div>
            <div class="controls">
                <div class="input-group">
                    <input type="password" id="apiKey" placeholder="Groq API Key (Stored Locally)" class="api-input">
                    <button onclick="clearKey()" class="clear-btn">Clear</button>
                </div>
                <div class="button-row">
                    <button onclick="selectFolder()" id="scanBtn" class="primary-btn">
                        <span>📂</span> Scan Folder
                    </button>
                    <button onclick="resetApp()" class="icon-btn" title="Reset">🔄</button>
                </div>
            </div>
        </header>

        <div id="statusBox" class="status-box hidden">
            <span id="statusText">Ready...</span>
            <div id="loader" class="loader hidden"></div>
        </div>

        <div id="resultsGrid" class="results-grid">
            <div id="emptyState" class="empty-state">
                <p>Select a folder to begin scanning your local files.</p>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">Requires a modern desktop browser (Chrome, Edge, or Opera).</p>
            </div>
        </div>

        <div id="actionBar" class="action-bar hidden">
            <div class="selection-info">
                <div class="badge">
                    <span id="selectedCount">0</span> SELECTED
                </div>
                <div class="format-selector">
                    <label>Export Script Type</label>
                    <select id="scriptType">
                        <option value="bat">Windows (.bat)</option>
                        <option value="sh">Linux/Mac (.sh)</option>
                        <option value="py">Python (.py)</option>
                        <option value="pl">Perl (.pl)</option>
                    </select>
                </div>
            </div>
            
            <button onclick="processAI()" id="aiBtn" class="ai-btn">
                <span>🤖</span> GENERATE CLEANUP FILE
            </button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'groq_api_key_janitor';
        const MODELS = ["llama-3.1-70b-versatile", "llama-3.3-70b-versatile", "mixtral-8x7b-32768"];
        let duplicateGroups = {};
        let selectedPaths = new Set();

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            
            document.getElementById('apiKey').addEventListener('input', (e) => {
                localStorage.setItem(STORAGE_KEY, e.target.value);
            });
        });

        function clearKey() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('apiKey').value = '';
        }

        function setStatus(msg, showLoader = false) {
            const box = document.getElementById('statusBox');
            box.classList.remove('hidden');
            document.getElementById('statusText').innerText = msg;
            document.getElementById('loader').classList.toggle('hidden', !showLoader);
        }

        async function selectFolder() {
            try {
                if (!window.showDirectoryPicker) {
                    alert("Your browser does not support the File System Access API. Please use Chrome, Edge, or Opera on Desktop.");
                    return;
                }

                const dirHandle = await window.showDirectoryPicker();
                resetApp(false);
                setStatus("Analyzing folder structure...", true);
                duplicateGroups = {};
                await scanFolder(dirHandle);
                renderResults();
            } catch (err) {
                if(err.name !== 'AbortError') {
                    console.error(err);
                    setStatus("Error: Permission denied or folder access failed.");
                }
            }
        }

        async function scanFolder(dirHandle, path = "") {
            for await (const entry of dirHandle.values()) {
                const fullPath = path ? `${path}/${entry.name}` : entry.name;
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const hash = await generateSpeedHash(file);
                    
                    if (!duplicateGroups[hash]) duplicateGroups[hash] = [];
                    
                    let preview = null;
                    if (file.type.startsWith('image/')) {
                        // Using FileReader to get Base64 for better compatibility
                        preview = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(file);
                        });
                    }
                    
                    duplicateGroups[hash].push({
                        name: entry.name,
                        path: fullPath,
                        size: file.size,
                        preview: preview,
                        modified: new Date(file.lastModified).toLocaleDateString()
                    });
                } else if (entry.kind === 'directory') {
                    await scanFolder(entry, fullPath);
                }
            }
        }

        async function generateSpeedHash(file) {
            const chunk = file.slice(0, 16384);
            const buffer = await chunk.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return `${file.size}-${hashArray.map(b => b.toString(16).padStart(2, '0')).join('')}`;
        }

        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            let groupCount = 0;
            
            Object.entries(duplicateGroups).forEach(([hash, files]) => {
                if (files.length > 1) {
                    groupCount++;
                    const groupContainer = document.createElement('div');
                    groupContainer.className = "duplicate-group";
                    
                    const listHtml = files.map(f => `
                        <div class="file-card">
                            <input type="checkbox" onchange="toggleFile('${f.path}', this.checked)">
                            <div class="preview-box">
                                ${f.preview ? `<img src="${f.preview}" class="preview-img">` : `<span style="font-size:10px; font-weight:bold; color:var(--text-muted)">${f.name.split('.').pop().toUpperCase()}</span>`}
                            </div>
                            <div style="flex:1; min-width:0">
                                <p style="margin:0; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size: 0.9rem;">${f.name}</p>
                                <p style="margin:0.2rem 0 0 0; font-size:0.7rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${f.path}</p>
                                <p style="margin:0.2rem 0 0 0; font-size:0.65rem; color:var(--accent-blue);">Size: ${(f.size/1024).toFixed(2)} KB</p>
                            </div>
                        </div>
                    `).join('');
                    
                    groupContainer.innerHTML = `<div style="font-size:10px; color:var(--accent-red); font-weight:bold; letter-spacing: 1px; margin-bottom:10px;">DUPLICATE SET ${groupCount}</div>${listHtml}`;
                    grid.appendChild(groupContainer);
                }
            });

            if (groupCount > 0) {
                setStatus(`Scan complete. Found ${groupCount} duplicate sets.`);
                document.getElementById('actionBar').classList.remove('hidden');
            } else {
                setStatus("Folder scan finished. No duplicates found.");
                grid.innerHTML = `<div class="empty-state">No duplicates found in this folder.</div>`;
            }
        }

        function toggleFile(path, isChecked) {
            if (isChecked) selectedPaths.add(path);
            else selectedPaths.delete(path);
            document.getElementById('selectedCount').innerText = selectedPaths.size;
        }

        function resetApp(full = true) {
            selectedPaths.clear();
            document.getElementById('selectedCount').innerText = '0';
            document.getElementById('resultsGrid').innerHTML = '';
            document.getElementById('resultsGrid').innerHTML = `<div id="emptyState" class="empty-state"><p>Select a folder to begin scanning.</p></div>`;
            document.getElementById('actionBar').classList.add('hidden');
            if(full) document.getElementById('statusBox').classList.add('hidden');
        }

        async function processAI() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return alert("Please enter your Groq API Key.");
            if (selectedPaths.size === 0) return alert("Please select at least one duplicate file to remove.");
            
            const type = document.getElementById('scriptType').value;
            const btn = document.getElementById('aiBtn');
            btn.disabled = true;
            setStatus(`AI is generating your ${type.toUpperCase()} deletion script...`, true);
            
            const prompt = `Task: Create a professional script to delete duplicate files.
            Format: ${type}
            Logic: Set a variable DRY_RUN=true by default. If true, print names of files to delete. If false, perform the deletion.
            Files to include in script: ${JSON.stringify(Array.from(selectedPaths))}
            
            Output ONLY the script code. No explanation or markers.`;
            
            try {
                const code = await fetchGroqWithFallback(prompt);
                const blob = new Blob([code], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `cleanup_duplicates.${type}`;
                a.click();
                setStatus("Script generated and downloaded!", false);
            } catch (err) {
                setStatus(`AI Generation Error: ${err.message}`, false);
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        async function fetchGroqWithFallback(prompt, index = 0) {
            if (index >= MODELS.length) throw new Error("All Groq models failed. Check your API key or connection.");
            
            const apiKey = document.getElementById('apiKey').value;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${apiKey}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ 
                        model: MODELS[index], 
                        messages: [
                            { role: "system", content: "You are a code generation assistant. Return raw script code only." },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.1
                    })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error?.message || "Model error");
                }
                
                const data = await res.json();
                let content = data.choices[0].message.content;
                return content.replace(/```[a-z]*\n/gi, '').replace(/```/g, '').trim();
            } catch (e) {
                console.warn(`Model ${MODELS[index]} failed, trying next available model...`);
                return fetchGroqWithFallback(prompt, index + 1);
            }
        }
    </script>
</body>
</html>
