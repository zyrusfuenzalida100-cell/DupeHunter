<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Duplicate Janitor</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 140px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .main-header {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) { .main-header { flex-direction: row; } }

        .title { margin: 0; font-size: 1.75rem; font-weight: 800; color: white; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }

        .controls { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 400px; }

        .input-group { position: relative; display: flex; width: 100%; }
        .api-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .api-input:focus { border-color: var(--accent-blue); }

        .button-row { display: flex; gap: 0.5rem; }
        .primary-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .primary-btn:hover { background: #2563eb; transform: translateY(-1px); }

        .status-box {
            padding: 1.25rem;
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #0f172a;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            transition: width 0.3s ease;
        }

        .current-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .results-section { margin-bottom: 2rem; }
        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .duplicate-group {
            background: var(--bg-card);
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .group-header {
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .file-card:last-child { border-bottom: none; }

        .preview-box {
            width: 90px;
            height: 90px;
            background: #0f172a;
            border-radius: 0.5rem;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .preview-img, .preview-video { width: 100%; height: 100%; object-fit: cover; }
        .video-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 8px;
            font-weight: bold;
        }

        .metadata-tag {
            font-size: 0.7rem;
            background: #334155;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-right: 0.4rem;
            color: #cbd5e1;
        }

        .action-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            padding: 1.25rem;
            border-radius: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .ai-script-btn {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .hidden { display: none !important; }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-red);
            cursor: pointer;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .exact-tag { color: var(--accent-red); font-size: 0.65rem; font-weight: 900; background: rgba(239, 68, 68, 0.1); padding: 2px 6px; border-radius: 4px; }
        .ai-tag { color: var(--accent-purple); font-size: 0.65rem; font-weight: 900; background: rgba(168, 85, 247, 0.1); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <div>
                <h1 class="title">AI Duplicate Janitor</h1>
                <p class="subtitle">Deep SHA-256 Hashing + AI Similarity Intelligence</p>
            </div>
            <div class="controls">
                <div class="input-group">
                    <input type="password" id="apiKey" placeholder="Groq API Key" class="api-input">
                </div>
                <div class="button-row">
                    <button onclick="selectFolder()" id="scanBtn" class="primary-btn">
                        <span>📂</span> Open Folder to Scan
                    </button>
                    <button onclick="location.reload()" class="primary-btn" style="background:#475569; max-width: 50px;">🔄</button>
                </div>
            </div>
        </header>

        <div id="statusBox" class="status-box hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="statusText" style="font-weight: 600; font-size: 0.95rem;">Ready...</span>
                <div id="loader" class="loader hidden"></div>
            </div>
            <div id="progressContainer" class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <code id="currentPath" class="current-path"></code>
        </div>

        <div id="resultsGrid">
            <!-- Exact Matches -->
            <div id="exactSection" class="results-section hidden">
                <div class="section-title" style="color: var(--accent-red);">🔴 Exact Matches (100% Identical)</div>
                <div id="exactGroups"></div>
            </div>

            <!-- AI Similarity Matches -->
            <div id="aiSection" class="results-section hidden">
                <div class="section-title" style="color: var(--accent-purple);">✨ AI Similarity Matches (Possible Duplicates)</div>
                <div id="aiGroups"></div>
            </div>

            <div id="emptyState" class="empty-state" style="text-align: center; padding: 4rem; opacity: 0.4;">
                <p>No results yet. Select a folder to begin deep scanning.</p>
            </div>
        </div>

        <div id="actionBar" class="action-bar hidden">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div>
                    <span id="selectedCount" style="font-size: 1.5rem; font-weight: 900; color: var(--accent-red);">0</span>
                    <span style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); display: block; margin-top: -5px;">FILES SELECTED</span>
                </div>
                <div class="format-selector">
                    <label style="font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Export To</label>
                    <select id="scriptType" style="background: #0f172a; color: white; border: 1px solid var(--border-color); padding: 4px; border-radius: 4px; display: block; margin-top: 2px;">
                        <option value="bat">Windows (.bat)</option>
                        <option value="sh">Linux/Mac (.sh)</option>
                    </select>
                </div>
            </div>
            <button onclick="generateScript()" class="ai-script-btn">GENERATE CLEANUP SCRIPT</button>
        </div>
    </div>

    <script>
        const MODELS = ["llama-3.3-70b-versatile", "llama-3.1-70b-versatile"];
        let allFiles = [];
        let exactGroups = {};
        let selectedPaths = new Set();
        let totalFiles = 0;
        let processedFiles = 0;

        window.onload = () => {
            const saved = localStorage.getItem('janitor_key');
            if (saved) document.getElementById('apiKey').value = saved;
            document.getElementById('apiKey').oninput = (e) => localStorage.setItem('janitor_key', e.target.value);
        };

        function setStatus(txt, loading = false) {
            document.getElementById('statusBox').classList.remove('hidden');
            document.getElementById('statusText').innerText = txt;
            document.getElementById('loader').classList.toggle('hidden', !loading);
        }

        async function countFiles(handle) {
            let count = 0;
            for await (const entry of handle.values()) {
                if (entry.kind === 'file') count++;
                else count += await countFiles(entry);
            }
            return count;
        }

        async function selectFolder() {
            try {
                const handle = await window.showDirectoryPicker();
                document.getElementById('emptyState').classList.add('hidden');
                totalFiles = await countFiles(handle);
                processedFiles = 0;
                exactGroups = {};
                allFiles = [];
                
                setStatus("Deep Scanning Content...", true);
                await scan(handle);
                
                renderExactMatches();
                
                if (document.getElementById('apiKey').value) {
                    await startAIScan();
                } else {
                    setStatus("Scan Complete. (Add API Key for AI Similarity scan)");
                }
            } catch (e) { if(e.name !== 'AbortError') console.error(e); }
        }

        async function scan(handle, path = "") {
            for await (const entry of handle.values()) {
                const fullPath = path ? `${path}/${entry.name}` : entry.name;
                if (entry.kind === 'directory') {
                    await scan(entry, fullPath);
                } else {
                    const file = await entry.getFile();
                    processedFiles++;
                    const percent = (processedFiles / totalFiles) * 100;
                    document.getElementById('progressBar').style.width = `${percent}%`;
                    document.getElementById('currentPath').innerText = fullPath;

                    // FULL FILE HASH - No shortcuts for accuracy
                    const hash = await computeHash(file);
                    
                    const meta = {
                        name: entry.name,
                        path: fullPath,
                        size: file.size,
                        modified: file.lastModified,
                        type: file.type,
                        preview: null,
                        res: null,
                        ext: entry.name.split('.').pop().toLowerCase()
                    };

                    if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
                        const url = URL.createObjectURL(file);
                        meta.preview = url;
                        if (file.type.startsWith('image/')) {
                            const img = new Image(); img.src = url;
                            await new Promise(r => img.onload = () => { meta.res = `${img.width}x${img.height}`; r(); });
                        }
                    }

                    if (!exactGroups[hash]) exactGroups[hash] = [];
                    exactGroups[hash].push(meta);
                    allFiles.push(meta);
                }
            }
        }

        async function computeHash(file) {
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function renderExactMatches() {
            const container = document.getElementById('exactGroups');
            container.innerHTML = "";
            let count = 0;
            
            Object.entries(exactGroups).forEach(([hash, files]) => {
                if (files.length > 1) {
                    count++;
                    container.appendChild(createGroupUI(files, `Exact Match Group #${count}`, "exact"));
                }
            });

            if (count > 0) {
                document.getElementById('exactSection').classList.remove('hidden');
                document.getElementById('actionBar').classList.remove('hidden');
            }
        }

        async function startAIScan() {
            setStatus("AI Thinking: Grouping similar names and metadata...", true);
            const apiKey = document.getElementById('apiKey').value;
            
            // Send metadata to AI
            const list = allFiles.map(f => ({ n: f.name, p: f.path, s: f.size, r: f.res }));
            
            // Only send files that AREN'T already in exact groups to save tokens
            const inExact = new Set(Object.values(exactGroups).filter(g => g.length > 1).flat().map(f => f.path));
            const filtered = list.filter(f => !inExact.includes(f.p)).slice(0, 500);

            const prompt = `Find possible duplicates (near matches) from this file list. 
            Group them by similarity (filenames with numbers like img01 vs img01_copy, or same name different case).
            Return ONLY a JSON array of arrays of file paths.
            Files: ${JSON.stringify(filtered)}`;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: MODELS[0], 
                        messages: [{role: "user", content: prompt}],
                        response_format: { type: "json_object" }
                    })
                });
                
                const data = await res.json();
                const content = JSON.parse(data.choices[0].message.content);
                const groups = Object.values(content)[0]; // Extract first array found

                if (groups && groups.length > 0) {
                    document.getElementById('aiSection').classList.remove('hidden');
                    const container = document.getElementById('aiGroups');
                    groups.forEach((paths, i) => {
                        const groupFiles = allFiles.filter(f => paths.includes(f.path));
                        if (groupFiles.length > 1) container.appendChild(createGroupUI(groupFiles, `Possible Duplicate #${i+1}`, "ai"));
                    });
                }
                setStatus("AI Scan Complete.");
            } catch (e) {
                console.error(e);
                setStatus("AI Scan failed or returned no results.");
            }
        }

        function createGroupUI(files, title, type) {
            const div = document.createElement('div');
            div.className = "duplicate-group";
            const tag = type === 'exact' ? '<span class="exact-tag">HASH MATCH</span>' : '<span class="ai-tag">SIMILARITY MATCH</span>';
            
            div.innerHTML = `
                <div class="group-header">
                    <span style="font-size: 0.75rem; font-weight: 800;">${title}</span>
                    ${tag}
                </div>
                <div class="group-files">
                    ${files.map(f => `
                        <div class="file-card">
                            <input type="checkbox" onchange="updateSelection('${f.path}', this.checked)">
                            <div class="preview-box">
                                ${f.preview ? 
                                    (f.type.startsWith('video/') ? `<video src="${f.preview}" class="preview-video" muted onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video><span class="video-badge">VIDEO</span>` : `<img src="${f.preview}" class="preview-img">`) 
                                    : `<div style="display:flex; height:100%; align-items:center; justify-content:center; font-size:12px; color:#475569; font-weight:900">${f.ext.toUpperCase()}</div>`
                                }
                            </div>
                            <div style="flex: 1; min-width: 0;">
                                <div style="font-size: 0.85rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${f.name}</div>
                                <div style="font-size: 0.65rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 2px 0;">${f.path}</div>
                                <div style="display: flex; margin-top: 5px;">
                                    <span class="metadata-tag">${(f.size/1024/1024).toFixed(2)} MB</span>
                                    ${f.res ? `<span class="metadata-tag">${f.res}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            return div;
        }

        function updateSelection(path, checked) {
            if (checked) selectedPaths.add(path);
            else selectedPaths.delete(path);
            document.getElementById('selectedCount').innerText = selectedPaths.size;
        }

        async function generateScript() {
            if (selectedPaths.size === 0) return;
            const apiKey = document.getElementById('apiKey').value;
            const type = document.getElementById('scriptType').value;
            setStatus("Generating Cleanup Script...", true);
            
            const prompt = `Generate a safe ${type} script to delete these files. 
            Paths: ${JSON.stringify(Array.from(selectedPaths))}. 
            Add a 'Dry Run' echo at the start and handle spaces in paths with quotes.`;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODELS[0], messages: [{role: "user", content: prompt}] })
                });
                const data = await res.json();
                const code = data.choices[0].message.content.replace(/```[a-z]*\n/gi, '').replace(/```/g, '').trim();
                
                const blob = new Blob([code], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `janitor_cleanup.${type}`; a.click();
                setStatus("Script Downloaded!");
            } catch (e) { setStatus("Error generating script."); }
        }
    </script>
</body>
</html>
