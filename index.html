<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Duplicate Janitor</title>
    <style>
        :root {
            --bg-dark: #111827;
            --bg-card: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --border-color: #374151;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        .main-header {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .main-header { flex-direction: row; }
        }

        .title {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #60a5fa, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--text-muted); font-size: 0.875rem; margin: 0.2rem 0 0 0; }

        .controls { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
        @media (min-width: 768px) { .controls { width: auto; } }

        .input-group { position: relative; display: flex; }
        .api-input {
            width: 100%;
            background: #374151;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.9rem;
        }

        .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            background: #4b5563;
            border: none;
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .button-row { display: flex; gap: 0.5rem; }
        .primary-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .icon-btn {
            background: #374151;
            border: none;
            color: white;
            padding: 0.7rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        /* Progress Styling */
        .status-box {
            padding: 1.25rem;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-green));
            transition: width 0.1s ease-out;
        }

        .current-path {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results-grid { display: grid; gap: 1.5rem; }
        .empty-state { padding: 5rem 0; text-align: center; opacity: 0.5; }

        .duplicate-group {
            background: var(--bg-card);
            padding: 1.25rem;
            border-radius: 1rem;
            border-left: 5px solid var(--accent-red);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .file-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.75rem;
            margin-top: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .preview-box {
            width: 64px;
            height: 64px;
            background: #111827;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .preview-img { width: 100%; height: 100%; object-fit: cover; }

        .action-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.25rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .selection-info { display: flex; align-items: center; gap: 1.5rem; }
        .badge { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.8rem; }
        
        .format-selector { display: flex; flex-direction: column; gap: 0.2rem; }
        .format-selector label { font-size: 0.65rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
        .format-selector select { 
            background: #374151; 
            color: white; 
            border: 1px solid var(--border-color); 
            border-radius: 0.4rem; 
            padding: 0.3rem; 
            font-size: 0.85rem; 
        }

        .ai-btn {
            background: linear-gradient(to right, #dc2626, #f87171);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .deep-scan-btn {
            background: linear-gradient(to right, #10b981, #34d399);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .ai-btn:active, .deep-scan-btn:active { transform: scale(0.96); }
        .ai-btn:disabled, .deep-scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hidden { display: none !important; }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-red);
        }

        .metadata-tag {
            font-size: 0.6rem;
            background: #4b5563;
            padding: 0.1rem 0.3rem;
            border-radius: 0.2rem;
            margin-right: 0.3rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <div class="brand">
                <h1 class="title">AI Duplicate Janitor</h1>
                <p class="subtitle">Smart Hashing & AI Metadata Analysis</p>
            </div>
            <div class="controls">
                <div class="input-group">
                    <input type="password" id="apiKey" placeholder="Groq API Key (Stored Locally)" class="api-input">
                    <button onclick="clearKey()" class="clear-btn">Clear</button>
                </div>
                <div class="button-row">
                    <button onclick="selectFolder()" id="scanBtn" class="primary-btn">
                        <span>📂</span> Scan Folder
                    </button>
                    <button onclick="resetApp()" class="icon-btn" title="Reset">🔄</button>
                </div>
            </div>
        </header>

        <!-- Improved Status with Progress -->
        <div id="statusBox" class="status-box hidden">
            <div class="status-header">
                <span id="statusText">Ready...</span>
                <div id="loader" class="loader hidden"></div>
            </div>
            <div id="progressContainer" class="progress-container hidden">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <code id="currentPath" class="current-path hidden"></code>
        </div>

        <div id="resultsGrid" class="results-grid">
            <div id="emptyState" class="empty-state">
                <p>Select a folder to begin scanning your local files.</p>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">The janitor uses SHA-256 for exact matches and AI for similar files.</p>
            </div>
        </div>

        <div id="actionBar" class="action-bar hidden">
            <div class="selection-info">
                <div class="badge">
                    <span id="selectedCount">0</span> SELECTED
                </div>
                <div class="format-selector">
                    <label>Export Script Type</label>
                    <select id="scriptType">
                        <option value="bat">Windows (.bat)</option>
                        <option value="sh">Linux/Mac (.sh)</option>
                        <option value="py">Python (.py)</option>
                        <option value="pl">Perl (.pl)</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; gap: 0.5rem;">
                <button onclick="deepScanAI()" id="deepScanBtn" class="deep-scan-btn" title="Ask AI to find similar names/content">
                    <span>🧠</span> AI DEEP SCAN
                </button>
                <button onclick="processAI()" id="aiBtn" class="ai-btn">
                    <span>🤖</span> GENERATE CLEANUP
                </button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'groq_api_key_janitor';
        const MODELS = ["llama-3.1-70b-versatile", "llama-3.3-70b-versatile", "mixtral-8x7b-32768"];
        let allFiles = []; 
        let duplicateGroups = {};
        let selectedPaths = new Set();
        let totalFilesCount = 0;
        let processedFilesCount = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            
            document.getElementById('apiKey').addEventListener('input', (e) => {
                localStorage.setItem(STORAGE_KEY, e.target.value);
            });
        });

        function clearKey() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('apiKey').value = '';
        }

        function setStatus(msg, showLoader = false, showProgress = false) {
            const box = document.getElementById('statusBox');
            box.classList.remove('hidden');
            document.getElementById('statusText').innerText = msg;
            document.getElementById('loader').classList.toggle('hidden', !showLoader);
            
            const progress = document.getElementById('progressContainer');
            progress.classList.toggle('hidden', !showProgress);
            
            const pathDisplay = document.getElementById('currentPath');
            pathDisplay.classList.toggle('hidden', !showProgress);
        }

        function updateProgress(path) {
            processedFilesCount++;
            const pathDisplay = document.getElementById('currentPath');
            pathDisplay.innerText = `Scanning: ${path}`;
            
            if (totalFilesCount > 0) {
                const percent = (processedFilesCount / totalFilesCount) * 100;
                document.getElementById('progressBar').style.width = `${percent}%`;
            }
        }

        async function countFiles(dirHandle) {
            let count = 0;
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') count++;
                else if (entry.kind === 'directory') count += await countFiles(entry);
            }
            return count;
        }

        async function selectFolder() {
            try {
                if (!window.showDirectoryPicker) {
                    alert("Your browser does not support Directory Picker. Please use Chrome/Edge on Desktop.");
                    return;
                }

                const dirHandle = await window.showDirectoryPicker();
                resetApp(false);
                
                setStatus("Calculating total files...", true, false);
                totalFilesCount = await countFiles(dirHandle);
                processedFilesCount = 0;
                
                setStatus("Indexing files and generating hashes...", true, true);
                duplicateGroups = {};
                allFiles = [];
                
                await scanFolder(dirHandle);
                renderResults();
            } catch (err) {
                if(err.name !== 'AbortError') {
                    console.error(err);
                    setStatus("Error: Folder access failed.");
                }
            }
        }

        async function scanFolder(dirHandle, path = "") {
            for await (const entry of dirHandle.values()) {
                const fullPath = path ? `${path}/${entry.name}` : entry.name;
                
                if (entry.kind === 'file') {
                    updateProgress(fullPath);
                    const file = await entry.getFile();
                    const hash = await generateSpeedHash(file);
                    
                    let meta = {
                        name: entry.name,
                        path: fullPath,
                        size: file.size,
                        modified: file.lastModified,
                        type: file.type,
                        resolution: null
                    };

                    if (file.type.startsWith('image/')) {
                        meta.preview = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.readAsDataURL(file);
                        });
                        
                        const img = new Image();
                        img.src = meta.preview;
                        await new Promise(r => img.onload = () => {
                            meta.resolution = `${img.width}x${img.height}`;
                            r();
                        });
                    }
                    
                    if (!duplicateGroups[hash]) duplicateGroups[hash] = [];
                    duplicateGroups[hash].push(meta);
                    allFiles.push(meta);

                } else if (entry.kind === 'directory') {
                    await scanFolder(entry, fullPath);
                }
            }
        }

        async function generateSpeedHash(file) {
            const head = file.slice(0, 16384);
            const tail = file.slice(Math.max(0, file.size - 16384));
            const headBuf = await head.arrayBuffer();
            const tailBuf = await tail.arrayBuffer();
            const combined = new Uint8Array(headBuf.byteLength + tailBuf.byteLength);
            combined.set(new Uint8Array(headBuf), 0);
            combined.set(new Uint8Array(tailBuf), headBuf.byteLength);
            const hashBuffer = await crypto.subtle.digest('SHA-256', combined);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return `${file.size}-${hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16)}`;
        }

        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            let groupCount = 0;
            
            Object.entries(duplicateGroups).forEach(([hash, files]) => {
                if (files.length > 1) {
                    groupCount++;
                    grid.appendChild(createGroupUI(files, `HASH MATCH SET ${groupCount}`));
                }
            });

            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('currentPath').classList.add('hidden');

            if (groupCount > 0) {
                setStatus(`Found ${groupCount} sets of exact binary duplicates.`);
                document.getElementById('actionBar').classList.remove('hidden');
            } else {
                setStatus("No exact duplicates found. Try 'AI Deep Scan'.");
                grid.innerHTML = `<div class="empty-state">No exact duplicates found.</div>`;
                document.getElementById('actionBar').classList.remove('hidden');
            }
        }

        function createGroupUI(files, titleText) {
            const groupContainer = document.createElement('div');
            groupContainer.className = "duplicate-group";
            const listHtml = files.map(f => `
                <div class="file-card">
                    <input type="checkbox" onchange="toggleFile('${f.path}', this.checked)">
                    <div class="preview-box">
                        ${f.preview ? `<img src="${f.preview}" class="preview-img">` : `<span style="font-size:10px; font-weight:bold; color:var(--text-muted)">${f.name.split('.').pop().toUpperCase()}</span>`}
                    </div>
                    <div style="flex:1; min-width:0">
                        <p style="margin:0; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size: 0.9rem;">${f.name}</p>
                        <p style="margin:0.2rem 0 0 0; font-size:0.7rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${f.path}</p>
                        <div style="margin-top: 0.3rem">
                            <span class="metadata-tag">${(f.size/1024).toFixed(1)} KB</span>
                            ${f.resolution ? `<span class="metadata-tag">${f.resolution}</span>` : ''}
                            <span class="metadata-tag">${new Date(f.modified).toLocaleDateString()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            groupContainer.innerHTML = `<div style="font-size:10px; color:var(--accent-red); font-weight:bold; letter-spacing: 1px; margin-bottom:10px;">${titleText}</div>${listHtml}`;
            return groupContainer;
        }

        async function deepScanAI() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return alert("AI Deep Scan requires a Groq API Key.");
            
            setStatus("AI is analyzing file patterns, names, and resolutions...", true, false);
            const btn = document.getElementById('deepScanBtn');
            btn.disabled = true;

            const fileList = allFiles.map(f => ({
                name: f.name,
                path: f.path,
                size: f.size,
                res: f.resolution,
                date: new Date(f.modified).toISOString().split('T')[0]
            }));

            const prompt = `Act as a file system expert. Analyze this list of files and group them if they are likely duplicates or versions of the same content based on:
            1. Similar names (e.g. "photo.jpg" vs "photo (1).jpg")
            2. Same content in different resolutions (size/res comparison)
            3. Identical sizes but different names.
            
            FILES: ${JSON.stringify(fileList)}
            
            Return ONLY a JSON array of arrays, where each inner array contains the 'path' strings of files that belong together.`;

            try {
                const responseText = await fetchGroqWithFallback(prompt);
                const suggestedGroups = JSON.parse(responseText);
                const grid = document.getElementById('resultsGrid');
                grid.innerHTML = '<div style="background:var(--bg-card); padding:1rem; border-radius:0.5rem; color:var(--accent-green); margin-bottom:1rem; font-weight:bold">AI Deep Scan Results</div>';
                suggestedGroups.forEach((paths, i) => {
                    const groupFiles = allFiles.filter(f => paths.includes(f.path));
                    if(groupFiles.length > 0) grid.appendChild(createGroupUI(groupFiles, `AI SUGGESTED GROUP ${i+1}`));
                });
                setStatus("AI Deep Scan complete.");
            } catch (err) {
                setStatus("AI Scan Error.");
            } finally {
                btn.disabled = false;
            }
        }

        function toggleFile(path, isChecked) {
            if (isChecked) selectedPaths.add(path);
            else selectedPaths.delete(path);
            document.getElementById('selectedCount').innerText = selectedPaths.size;
        }

        function resetApp(full = true) {
            selectedPaths.clear();
            allFiles = [];
            totalFilesCount = 0;
            processedFilesCount = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('selectedCount').innerText = '0';
            document.getElementById('resultsGrid').innerHTML = `<div id="emptyState" class="empty-state"><p>Select a folder to begin scanning.</p></div>`;
            document.getElementById('actionBar').classList.add('hidden');
            if(full) document.getElementById('statusBox').classList.add('hidden');
        }

        async function processAI() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return alert("Please enter your Groq API Key.");
            if (selectedPaths.size === 0) return alert("Select files to remove.");
            const type = document.getElementById('scriptType').value;
            const btn = document.getElementById('aiBtn');
            btn.disabled = true;
            setStatus(`Generating ${type.toUpperCase()} script...`, true);
            const prompt = `Create a cleanup script (${type}) to delete these files. Include a 'DRY_RUN' mode. FILES: ${JSON.stringify(Array.from(selectedPaths))}`;
            try {
                const code = await fetchGroqWithFallback(prompt);
                const blob = new Blob([code], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `cleanup.${type}`; a.click();
                setStatus("Script downloaded!", false);
            } catch (err) {
                setStatus("Generation Error.", false);
            } finally {
                btn.disabled = false;
            }
        }

        async function fetchGroqWithFallback(prompt, index = 0) {
            if (index >= MODELS.length) throw new Error("API failure.");
            const apiKey = document.getElementById('apiKey').value;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: MODELS[index], 
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.1,
                        response_format: prompt.includes("JSON") ? { type: "json_object" } : undefined
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                let content = data.choices[0].message.content;
                if (prompt.includes("JSON")) {
                    try {
                        const parsed = JSON.parse(content);
                        if (Array.isArray(parsed)) return content;
                        return JSON.stringify(Object.values(parsed)[0]);
                    } catch(e) {}
                }
                return content.replace(/```[a-z]*\n/gi, '').replace(/```/g, '').trim();
            } catch (e) {
                return fetchGroqWithFallback(prompt, index + 1);
            }
        }
    </script>
</body>
</html>
